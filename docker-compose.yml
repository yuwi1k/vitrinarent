services:
  db:
    image: postgres:15-alpine
    restart: always
    ports:
      - "5433:5432"
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    depends_on:
      - db
    volumes:
      - ./static:/app/static
      - ./templates:/app/templates
      - ./app:/app/app

  backup:
    image: postgres:15-alpine
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      BACKUPS_DIR: /backups
      BACKUP_INTERVAL_SECONDS: "86400"
    volumes:
      - ./backups:/backups
      - ./scripts/backup_loop.sh:/backup_loop.sh:ro
    entrypoint: ["/bin/sh", "/backup_loop.sh"]
    depends_on:
      - db

volumes:
  postgres_data: