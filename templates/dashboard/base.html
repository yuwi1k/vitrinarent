<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Дашборд{% endblock %} — Vitrina</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta17/dist/css/tabler.min.css">
    {% block head %}{% endblock %}
</head>
<body>
    <div class="page">
        <header class="navbar navbar-expand-md navbar-light d-print-none">
            <div class="container-xl">
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbar-menu" aria-controls="navbar-menu" aria-expanded="false" aria-label="Переключить меню">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <h1 class="navbar-brand navbar-brand-autodark d-none-navbar-horizontal pe-0 pe-md-3">
                    <a href="/dashboard/properties">Vitrina</a>
                </h1>
                <div class="navbar-nav flex-row order-md-last">
                    <a href="/admin/logout" class="btn btn-outline-danger btn-sm">Выйти</a>
                </div>
                <div class="collapse navbar-collapse" id="navbar-menu">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link" href="/">На сайт</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if request.url.path.startswith('/dashboard/properties') %}active{% endif %}" href="/dashboard/properties">Объекты</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if request.url.path.startswith('/dashboard/folders') %}active{% endif %}" href="/dashboard/folders">Файлы</a>
                        </li>
                    </ul>
                </div>
            </div>
        </header>
        <div class="page-wrapper">
            <div class="page-body">
                <div class="container-xl">
                    {% block content %}{% endblock %}
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta17/dist/js/tabler.min.js"></script>
    {% block tail %}{% endblock %}
</body>
</html>
