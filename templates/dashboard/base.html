<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Дашборд{% endblock %} — Vitrina</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta17/dist/css/tabler.min.css">
    {% block head %}{% endblock %}
</head>
<body>
    <div class="page">
        <header class="navbar navbar-expand-md navbar-light d-print-none">
            <div class="container-xl">
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbar-menu" aria-controls="navbar-menu" aria-expanded="false" aria-label="Переключить меню">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <h1 class="navbar-brand navbar-brand-autodark d-none-navbar-horizontal pe-0 pe-md-3">
                    <a href="/dashboard">Vitrina</a>
                </h1>
                <div class="navbar-nav flex-row order-md-last gap-2">
                    <a href="/dashboard/export/avito" class="btn btn-outline-primary btn-sm" download="avito_feed.xml" title="Полный XML по шаблонам Продам/Сдам, контакты из настроек или .env">Скачать фид Авито</a>
                    <a href="/dashboard/export/avito-new" class="btn btn-outline-primary btn-sm" download="avito_feed_new.xml" title="Только объекты без AvitoId (ещё не выгружены на Авито)">Фид новых для Авито</a>
                    <a href="/dashboard/export/avito-autoload-new" class="btn btn-outline-success btn-sm" title="Отправить новых на Авито через Autoload API (нужны ключи и URL в .env)">Отправить новых на Авито</a>
                    <a href="/dashboard/avito/sync" class="btn btn-outline-success btn-sm" title="Подтянуть AvitoId и статусы из последнего отчёта автозагрузки">Синхронизировать статусы Авито</a>
                    <button type="button" class="btn btn-outline-primary btn-sm" id="copy-feed-url-btn" data-feed-url="{{ (request.base_url | string) ~ 'avito.xml' }}" title="Вставить этот URL в настройках автозагрузки в ЛК Авито — объявления будут подтягиваться по расписанию Авито">Скопировать URL фида</button>
                    <a href="/dashboard/export/csv" class="btn btn-outline-secondary btn-sm">Экспорт CSV</a>
                    <a href="/admin/logout" class="btn btn-outline-danger btn-sm">Выйти</a>
                </div>
                <div class="collapse navbar-collapse" id="navbar-menu">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link" href="/">На сайт</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if request.url.path == '/dashboard' %}active{% endif %}" href="/dashboard">Главная</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if request.url.path.startswith('/dashboard/properties') %}active{% endif %}" href="/dashboard/properties">Объекты</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if request.url.path.startswith('/dashboard/folders') %}active{% endif %}" href="/dashboard/folders">Файлы</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if request.url.path == '/dashboard/settings' %}active{% endif %}" href="/dashboard/settings">Настройки</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if request.url.path == '/dashboard/settings/password' %}active{% endif %}" href="/dashboard/settings/password">Сменить пароль</a>
                        </li>
                    </ul>
                </div>
            </div>
        </header>
        <div class="page-wrapper">
            <div class="page-body">
                <div class="container-xl">
                    {% block content %}{% endblock %}
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta17/dist/js/tabler.min.js"></script>
    <script>
      (function () {
        var btn = document.getElementById('copy-feed-url-btn');
        if (!btn) return;
        var url = btn.getAttribute('data-feed-url');
        if (!url) return;
        btn.addEventListener('click', function () {
          navigator.clipboard.writeText(url).then(function () {
            var t = btn.textContent;
            btn.textContent = 'Скопировано';
            btn.classList.add('btn-success');
            btn.classList.remove('btn-outline-primary');
            setTimeout(function () {
              btn.textContent = t;
              btn.classList.remove('btn-success');
              btn.classList.add('btn-outline-primary');
            }, 2000);
          }).catch(function () {
            btn.textContent = 'Ошибка';
            setTimeout(function () { btn.textContent = 'Скопировать URL фида'; }, 1500);
          });
        });
      })();
    </script>
    {% block tail %}{% endblock %}
</body>
</html>
