{% extends "dashboard/base.html" %}

{% block title %}Сменить пароль{% endblock %}

{% block content %}
<div class="mb-4">
    <h2 class="db-page-title">Сменить пароль</h2>
    <p class="db-page-subtitle">Надёжный пароль от 6 символов</p>
</div>

{% if success %}
<div class="alert alert-success" role="alert">Пароль успешно изменён.</div>
{% endif %}
{% if error %}
<div class="alert alert-danger" role="alert">{{ error }}</div>
{% endif %}

<div class="db-settings-card" style="max-width:500px;">
    <div class="db-settings-card-header">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" stroke-width="1.75" stroke="currentColor" fill="none"><path d="M5 13a2 2 0 0 1 2 -2h10a2 2 0 0 1 2 2v6a2 2 0 0 1 -2 2h-10a2 2 0 0 1 -2 -2v-6z"/><path d="M11 16a1 1 0 1 0 2 0a1 1 0 0 0 -2 0"/><path d="M8 11v-4a4 4 0 1 1 8 0v4"/></svg>
        <h3>Пароль администратора</h3>
    </div>
    <div class="db-settings-card-body">
        <form method="post" action="/dashboard/settings/password">
            <input type="hidden" name="_csrf_token" value="{{ csrf_token(request) }}">
            <div class="mb-3">
                <label class="form-label required">Текущий пароль</label>
                <input type="password" name="current_password" class="form-control" autocomplete="current-password" required placeholder="Текущий пароль">
            </div>
            <div class="mb-3">
                <label class="form-label required">Новый пароль</label>
                <input type="password" name="new_password" class="form-control" autocomplete="new-password" required minlength="6" placeholder="Не менее 6 символов">
            </div>
            <div class="mb-3">
                <label class="form-label required">Повторите</label>
                <input type="password" name="new_password_confirm" class="form-control" autocomplete="new-password" required minlength="6" placeholder="Повторите новый пароль">
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" class="me-1"><path d="M5 12l5 5l10 -10"/></svg>
                    Сохранить
                </button>
                <a href="/dashboard/settings" class="btn btn-outline-secondary">Отмена</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
