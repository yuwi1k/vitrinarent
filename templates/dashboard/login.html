<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Вход — Vitrina</title>
    <link rel="shortcut icon" href="/static/images/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/dashboard.css">
</head>

<body style="margin:0;">
    <div class="db-login-page">
        <div class="db-login-card">
            <div class="db-login-logo">V</div>
            <div class="db-login-title">Vitrina</div>
            <div class="db-login-subtitle">Панель управления</div>

            {% if error %}
            <div style="background:#fef2f2;color:#dc2626;border-radius:10px;padding:0.75rem 1rem;font-size:0.875rem;margin-bottom:1rem;text-align:center;">
                {{ error }}
            </div>
            {% endif %}

            <form action="/dashboard/login" method="post" autocomplete="off">
                <input type="hidden" name="_csrf_token" value="{{ csrf_token(request) }}">
                <div style="margin-bottom:1rem;">
                    <label style="display:block;font-weight:500;font-size:0.8125rem;color:#475569;margin-bottom:0.375rem;">Логин</label>
                    <input type="text" name="username" placeholder="admin" autocomplete="username"
                        value="{{ username or '' }}" required
                        style="width:100%;padding:0.625rem 0.875rem;border:1px solid #e2e8f0;border-radius:8px;font-size:0.875rem;font-family:inherit;outline:none;transition:border-color 0.2s;"
                        onfocus="this.style.borderColor='#4361ee'" onblur="this.style.borderColor='#e2e8f0'">
                </div>
                <div style="margin-bottom:1.5rem;">
                    <label style="display:block;font-weight:500;font-size:0.8125rem;color:#475569;margin-bottom:0.375rem;">Пароль</label>
                    <input type="password" name="password" placeholder="Пароль" autocomplete="current-password" required
                        style="width:100%;padding:0.625rem 0.875rem;border:1px solid #e2e8f0;border-radius:8px;font-size:0.875rem;font-family:inherit;outline:none;transition:border-color 0.2s;"
                        onfocus="this.style.borderColor='#4361ee'" onblur="this.style.borderColor='#e2e8f0'">
                </div>
                <button type="submit"
                    style="width:100%;padding:0.75rem;background:#4361ee;color:#fff;border:none;border-radius:8px;font-size:0.875rem;font-weight:600;font-family:inherit;cursor:pointer;transition:background 0.2s;"
                    onmouseover="this.style.background='#3651d4'" onmouseout="this.style.background='#4361ee'">
                    Войти
                </button>
            </form>

            <p style="text-align:center;margin-top:1.25rem;font-size:0.8125rem;">
                <a href="/" style="color:#64748b;text-decoration:none;">← На сайт</a>
            </p>
        </div>
    </div>
</body>

</html>
